name : Deploy

on:
  push:
    branches:
      - main
		
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH 접속 및 자동배포 실행....합니다!.
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}   
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
 
          script: |
            cd ~/gwon
            git pull
            ./gradlew build
            docker compose up -d
            