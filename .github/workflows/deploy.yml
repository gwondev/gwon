name : Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 접속 및 docker-compose up합니다!
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd ~/gwon
            git pull
            ./gradlew build
            docker compose up -d
          username: ${{ secrets.SERVER_USER }}
            