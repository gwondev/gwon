name : Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 접속 및 docker-compose up합니다!!!!!
        uses: appleboy/ssh-action@v1.0.0
        
        with:
          port: 22
          host: ${{ secrets.SERVER_HOST }}
          key: ${{ secrets.SERVER_KEY }}
          username: ${{ secrets.SERVER_USER }}
          script: |
            
            # 1. 최신 코드 강제 반영 (서버 로컬 변경 무시)  ss
            cd gwon
            git fetch --all
            git reset --hard origin/main
            git clean -fdx   # 추적 안되는 파일/폴더 싹 제거
            
            # 2. 컨테이너 종료 (볼륨 보존)
            docker compose down --remove-orphans
            
            # 3. backend JAR 강제 새 빌드
            cd backend
            chmod +x ./gradlew
            ./gradlew clean bootJar -x test
            ls -la build/libs/  # JAR 제대로 생성됐는지 확인
            cp build/libs/*.jar ../backend.jar
            cd ..
            
            # 서비스 전부 실행
            docker compose up -d --build
            
            # ✅ 4. Caddy가 gwon 프로젝트를 인식하도록 네트워크 연결
            docker network connect gwon_default gwon-caddy-1 || true
            docker network connect geon_default gwon-caddy-1 || true
            docker network connect move_default gwon-caddy-1 || true

            # (선택) Caddy 리로드
            docker restart gwon-caddy-1

            

