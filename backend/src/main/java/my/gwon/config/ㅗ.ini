import cv2
import tkinter as tk
from tkinter import font
from PIL import Image, ImageTk
import time
import threading
import serial
from ultralytics import YOLO

# --- 설정 ---
PORT = "/dev/ttyACM0" 
BAUD = 115200
MODEL_PATH = "best.onnx"
CONF_THRESHOLD = 0.90  # [수정] 신뢰도를 90%로 높여 더 확실할 때만 인식하게 함
DETECTION_FRAME_COUNT = 5 # [추가] 5프레임 연속 감지되어야 확정

class SmartRecyclingSystem:
    def __init__(self, root):
        self.root = root
        self.root.title("스마트 분리수거 시스템")
        self.root.attributes('-fullscreen', True)
        self.root.configure(bg='#34495e')

        self.ser = None
        self.connect_serial()
        self.is_processing = False     
        self.is_warning_active = False 
        
        # 연속 감지 카운터
        self.consecutive_count = 0
        self.current_target = None

        try:
            self.model = YOLO(MODEL_PATH, task="detect")
        except Exception as e:
            print(f"모델 로드 오류: {e}")

        self.setup_ui()
        
        self.cap = cv2.VideoCapture(0)
        self.cap.set(cv2.CAP_PROP_FRAME_WIDTH, 640)
        self.cap.set(cv2.CAP_PROP_FRAME_HEIGHT, 480)

        # [추가] 카메라 예열: 초기 30프레임은 버림 (노출 조절 시간)
        print("카메라 예열 중...")
        for _ in range(30):
            self.cap.read()
        print("시스템 준비 완료!")

        self.root.bind("<Escape>", lambda e: self.close_system())
        self.ai_thread = threading.Thread(target=self.run_ai_logic, daemon=True)
        self.ai_thread.start()

    def connect_serial(self):
        try:
            self.ser = serial.Serial(PORT, BAUD, timeout=1)
            time.sleep(2.0)
        except Exception as e:
            print(f"시리얼 연결 실패: {e}")

    def setup_ui(self):
        self.title_font = font.Font(family="NanumGothic", size=60, weight="bold")
        self.status_font = font.Font(family="NanumGothic", size=35)
        self.warn_font = font.Font(family="NanumGothic", size=45, weight="bold")

        try:
            self.icon_waiting = ImageTk.PhotoImage(Image.open("waiting.png").resize((300, 300)))
            self.icon_processing = ImageTk.PhotoImage(Image.open("processing.png").resize((300, 300)))
            self.icon_crushing = ImageTk.PhotoImage(Image.open("crushing.png").resize((300, 300)))
            self.icon_done = ImageTk.PhotoImage(Image.open("done.png").resize((300, 300)))
        except:
            self.icon_waiting = self.icon_processing = self.icon_crushing = self.icon_done = None

        self.main_frame = tk.Frame(self.root, bg='#34495e')
        self.main_frame.pack(expand=True)
        self.icon_label = tk.Label(self.main_frame, image=self.icon_waiting, bg='#34495e')
        self.icon_label.pack(pady=(0, 20))
        self.label = tk.Label(self.main_frame, text="쓰레기를 넣어주세요", fg="white", bg="#34495e", font=self.title_font)
        self.label.pack()
        self.status_label = tk.Label(self.main_frame, text="시스템 대기 중...", fg="#bdc3c7", bg="#34495e", font=self.status_font)
        self.status_label.pack(pady=(30, 0))

    def update_ui(self, main_text, status_text, bg_color, icon_image, is_warning=False):
        current_font = self.warn_font if is_warning else self.title_font
        self.root.after(0, lambda: self._update_ui_elements(main_text, status_text, bg_color, icon_image, current_font))

    def _update_ui_elements(self, main_text, status_text, bg_color, icon_image, current_font):
        self.label.config(text=main_text, bg=bg_color, font=current_font)
        self.status_label.config(text=status_text, bg=bg_color)
        self.root.configure(bg=bg_color)
        self.main_frame.config(bg=bg_color)
        self.icon_label.config(image=icon_image, bg=bg_color)

    def run_ai_logic(self):
        while True:
            ret, frame = self.cap.read()
            if not ret:
                continue

            if not self.is_processing:
                results = self.model.predict(source=frame, conf=CONF_THRESHOLD, imgsz=640, verbose=False)
                
                detected_labels = []
                if len(results[0].boxes) > 0:
                    detected_labels = [self.model.names[int(box.cls)] for box in results[0].boxes]

                # 1. 위험물 감지
                if 'battery' in detected_labels or 'lighter' in detected_labels:
                    self.consecutive_count = 0 
                    self.is_warning_active = True
                    self.update_ui("!!! 위험물 감지 !!!", "배터리나 라이터는 위험합니다.\n다시 가져가 주세요!", "#c0392b", self.icon_processing, is_warning=True)
                
                # 2. 압착 대상 감지 (연속성 체크)
                elif 'can' in detected_labels or 'pet' in detected_labels:
                    item = 'can' if 'can' in detected_labels else 'pet'
                    
                    if self.current_target == item:
                        self.consecutive_count += 1
                    else:
                        self.current_target = item
                        self.consecutive_count = 1
                    
                    # 지정된 프레임 이상 연속 감지될 때만 트리거
                    if self.consecutive_count >= DETECTION_FRAME_COUNT:
                        self.is_warning_active = False
                        msg = "캔 (CAN) 확인" if item == 'can' else "페트병 (PET) 확인"
                        cmd = 'C' if item == 'can' else 'P'
                        self.trigger_process(msg, cmd)
                        self.consecutive_count = 0
                
                # 3. 아무것도 없을 때
                else:
                    self.consecutive_count = 0
                    self.current_target = None
                    if self.is_warning_active:
                        self.is_warning_active = False
                        self.update_ui("쓰레기를 넣어주세요", "시스템 대기 중...", "#34495e", self.icon_waiting)
            
            time.sleep(0.05)

    def trigger_process(self, item_name, cmd):
        self.is_processing = True 
        self.update_ui(f"{item_name} 감지", "압착을 시작합니다. 잠시 기다려주세요.", "#3498db", self.icon_processing)
        time.sleep(2) 
        threading.Thread(target=self.run_actuator, args=(cmd,), daemon=True).start()

    def run_actuator(self, cmd):
        self.update_ui("압착 진행 중!", "부피를 줄이고 있습니다...", "#e67e22", self.icon_crushing)
        if self.ser:
            self.ser.write(cmd.encode("ascii"))
            self.ser.flush()

        time.sleep(10) 
        self.update_ui("처리 완료!", "다음 쓰레기를 넣어주세요.", "#27ae60", self.icon_done)
        time.sleep(4) 
        
        self.update_ui("쓰레기를 넣어주세요", "시스템 대기 중...", "#34495e", self.icon_waiting)
        time.sleep(1.0) # 버퍼 정리를 위해 조금 더 대기
        self.is_processing = False 

    def close_system(self):
        if self.ser: self.ser.close()
        self.cap.release()
        self.root.destroy()

if __name__ == "__main__":
    root = tk.Tk()
    app = SmartRecyclingSystem(root)
    root.mainloop()
