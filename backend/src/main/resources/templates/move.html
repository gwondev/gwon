<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MOVE PAGE</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        #map { width: 100%; height: 400px; margin-bottom: 10px; }
        #log { height: 300px; overflow-y: auto; background: #f4f4f4; padding: 5px; font-size: 13px; white-space: pre-wrap; }
    </style>
</head>
<body>
<h2>🚍 MOVE PAGE입니다.</h2>
<div id="map"></div>
<pre id="log"></pre>

<script>
    // Leaflet 지도 초기화 (광주 근처 중심)
    const map = L.map('map').setView([35.1466, 126.9221], 15);

    // OpenStreetMap 타일 레이어 추가
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // 마커 초기화
    let marker = L.marker([35.1466, 126.9221]).addTo(map);

    // 전체 로그 저장
    let logs = [];

    // SockJS + STOMP 연결
    const socket = new SockJS('https://gwon.my/ws');
    const stompClient = Stomp.over(socket);

    stompClient.connect({}, () => {
      console.log("✅ WebSocket 연결 성공");
      stompClient.subscribe('/topic/gps', (message) => {
        const data = JSON.parse(message.body);

        const lat = parseFloat(data.lat);
        const lng = parseFloat(data.lng);

        if (!isNaN(lat) && !isNaN(lng)) {
          // 마커 위치 갱신
          marker.setLatLng([lat, lng]);
          map.setView([lat, lng]);
        }

        // 로그 한 줄 생성
        const logEntry =
          `[#${data.gpsCount}] ${data.timeStamp}\n` +
          `  status=${data.driveStatus}, lat=${lat.toFixed(6)}, lng=${lng.toFixed(6)}\n` +
          `  speed=${data.speed}, heading=${data.heading}`;

        // 로그 추가
        logs.push(logEntry);

        // 최근 40개만 표시
        const latestLogs = logs.slice(-40);
        document.getElementById("log").textContent = latestLogs.join("\n\n");
      });
    });
</script>
</body>
</html>
