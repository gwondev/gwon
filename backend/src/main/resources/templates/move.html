<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MOVE PAGE</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: Arial, sans-serif; }
        #sidebar {
          width: 250px; border-right: 1px solid #ccc; padding: 10px;
          overflow-y: auto; background: #fafafa;
        }
        #map { flex: 1; height: 100%; }
        #log { height: 200px; overflow-y: auto; background: #f4f4f4;
               padding: 5px; font-size: 13px; white-space: pre-wrap; }
        .device-item {
          padding: 5px; margin: 3px 0; cursor: pointer;
          background: #f1f3f5; border-radius: 4px;
        }
        .device-item.active { background: #d0ebff; }
        button {
          width: 100%; padding: 6px; margin-bottom: 10px;
          border: none; border-radius: 4px;
          background: #74c0fc; color: #fff; cursor: pointer;
          font-size: 14px;
        }
        button:hover { background: #4dabf7; }
    </style>
</head>
<body>
<!-- 좌측 사이드바 -->
<div id="sidebar">
    <h3>📡 디바이스 목록</h3>
    <button onclick="showAllDevices()">🌍 전체 보기</button>
    <div id="deviceList">아직 데이터 없음</div>
    <h4>로그</h4>
    <pre id="log"></pre>
</div>

<!-- 지도 -->
<div id="map"></div>

<script>
    // Leaflet 지도 초기화
    const map = L.map('map').setView([35.1466, 126.9221], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // 디바이스 관리 { topic: {marker, latestData, orgName, orgId} }
    const devices = {};
    let selectedTopic = null;
    let logs = [];

    // UI 업데이트
    function updateDeviceList() {
      const listDiv = document.getElementById("deviceList");
      listDiv.innerHTML = "";
      Object.keys(devices).forEach(topic => {
        const { orgName, orgId } = devices[topic];
        const div = document.createElement("div");
        div.textContent = `${orgName} (${orgId})`;
        div.className = "device-item" + (selectedTopic === topic ? " active" : "");
        div.onclick = () => {
          selectedTopic = topic;
          updateDeviceList();
          const { lat, lng } = devices[topic].latestData;
          map.setView([lat, lng], 17);
          devices[topic].marker.openPopup();
        };
        listDiv.appendChild(div);
      });
      if (Object.keys(devices).length === 0) {
        listDiv.textContent = "아직 데이터 없음";
      }
    }

    // 🌍 전체 보기 버튼
    function showAllDevices() {
      const markers = Object.values(devices).map(d => d.marker);
      if (markers.length > 0) {
        const group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.2)); // 약간 여백
        selectedTopic = null; // 특정 디바이스 선택 해제
        updateDeviceList();
      }
    }

    // SockJS + STOMP 연결
    const socket = new SockJS('https://gwon.my/ws');
    const stompClient = Stomp.over(socket);

    stompClient.connect({}, () => {
      console.log("✅ WebSocket 연결 성공");
      stompClient.subscribe('/topic/gps', (message) => {
        const wrapper = JSON.parse(message.body); // { topic, payload }
        const topic = wrapper.topic;
        const data = typeof wrapper.payload === "string" ? JSON.parse(wrapper.payload) : wrapper.payload;

        const parts = topic.split("/");
        const orgName = parts[2] || "unknown";
        const orgId = parts[3] || "0";

        const lat = parseFloat(data.lat);
        const lng = parseFloat(data.lng);

        if (!isNaN(lat) && !isNaN(lng)) {
          if (!devices[topic]) {
            const marker = L.marker([lat, lng])
                .addTo(map)
                .bindPopup(`<b>${orgName} (${orgId})</b>`);
            devices[topic] = { marker, latestData: { lat, lng }, orgName, orgId };
            if (!selectedTopic) selectedTopic = topic;
            updateDeviceList();
          } else {
            devices[topic].marker.setLatLng([lat, lng]);
            devices[topic].latestData = { lat, lng };
          }

          if (selectedTopic === topic) {
            map.setView([lat, lng]);
          }
        }

        // 로그
        const logEntry =
          `[${orgName}-${orgId}] [#${data.gpsCount}] ${data.timeStamp}` +
          ` status=${data.driveStatus}, lat=${lat.toFixed(6)}, lng=${lng.toFixed(6)}` +
          ` speed=${data.speed}, heading=${data.heading}`;
        logs.push(logEntry);

        // 최근 40개만
        const latestLogs = logs.slice(-40);
        document.getElementById("log").textContent = latestLogs.join("\n");
      });
    });
</script>
</body>
</html>
