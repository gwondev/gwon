<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MOVE PAGE</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: Arial, sans-serif; }
        #sidebar {
          width: 250px; border-right: 1px solid #ccc; padding: 10px;
          overflow-y: auto; background: #fafafa;
        }
        #map { flex: 1; height: 100%; }
        #log { height: 200px; overflow-y: auto; background: #f4f4f4;
               padding: 5px; font-size: 13px; white-space: pre-wrap; }
        .device-item {
          padding: 5px; margin: 3px 0; cursor: pointer;
          background: #f1f3f5; border-radius: 4px;
        }
        .device-item.active { background: #d0ebff; }
    </style>
</head>
<body>
<!-- 좌측 사이드바 -->
<div id="sidebar">
    <h3>📡 디바이스 목록</h3>
    <div id="deviceList">아직 데이터 없음</div>
    <h4>로그</h4>
    <pre id="log"></pre>
</div>

<!-- 지도 -->
<div id="map"></div>

<script>
    // Leaflet 지도 초기화
    const map = L.map('map').setView([35.1466, 126.9221], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // 디바이스 관리 객체 { topic: {marker, latestData} }
    const devices = {};
    let selectedTopic = null;
    let logs = [];

    // UI 업데이트: 디바이스 리스트 갱신
    function updateDeviceList() {
      const listDiv = document.getElementById("deviceList");
      listDiv.innerHTML = "";
      Object.keys(devices).forEach(topic => {
        const div = document.createElement("div");
        div.textContent = topic;
        div.className = "device-item" + (selectedTopic === topic ? " active" : "");
        div.onclick = () => {
          selectedTopic = topic;
          updateDeviceList();
          const { lat, lng } = devices[topic].latestData;
          map.setView([lat, lng], 17);
          devices[topic].marker.openPopup();
        };
        listDiv.appendChild(div);
      });
      if (Object.keys(devices).length === 0) {
        listDiv.textContent = "아직 데이터 없음";
      }
    }

    // SockJS + STOMP 연결
    const socket = new SockJS('https://gwon.my/ws');
    const stompClient = Stomp.over(socket);

    stompClient.connect({}, () => {
      console.log("✅ WebSocket 연결 성공");
      stompClient.subscribe('/topic/gps', (message) => {
        const data = JSON.parse(message.body);

        const lat = parseFloat(data.lat);
        const lng = parseFloat(data.lng);
        const topic = data.topic || "move/gps/default"; // 서버에서 토픽 제공 시 사용

        if (!isNaN(lat) && !isNaN(lng)) {
          // 새 디바이스 등록
          if (!devices[topic]) {
            const marker = L.marker([lat, lng]).addTo(map).bindPopup(`<b>${topic}</b>`);
            devices[topic] = { marker, latestData: { lat, lng } };
            if (!selectedTopic) selectedTopic = topic;
            updateDeviceList();
          } else {
            // 기존 디바이스 업데이트
            devices[topic].marker.setLatLng([lat, lng]);
            devices[topic].latestData = { lat, lng };
          }

          // 선택된 디바이스일 경우 지도 이동
          if (selectedTopic === topic) {
            map.setView([lat, lng]);
          }
        }

        // 로그 추가
        const logEntry =
          `[${topic}] [#${data.gpsCount}] ${data.timeStamp}` +
          ` status=${data.driveStatus}, lat=${lat.toFixed(6)}, lng=${lng.toFixed(6)}` +
          ` speed=${data.speed}, heading=${data.heading}`;
        logs.push(logEntry);

        // 최근 40개만 표시
        const latestLogs = logs.slice(-40);
        document.getElementById("log").textContent = latestLogs.join("\n");
      });
    });
</script>
</body>
</html>
