version: '3.8'
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    command: |
      sh -c "
      echo 'server {
        listen 80;
        location / {
          proxy_pass http://frontend:3000;
          proxy_set_header Host \$$host;
          proxy_http_version 1.1;
          proxy_set_header Upgrade \$$http_upgrade;
          proxy_set_header Connection \"upgrade\";
        }
        location /backend {
          proxy_pass http://app:8080;
          proxy_set_header Host \$$host;
        }
      }' > /etc/nginx/conf.d/default.conf &&
      nginx -g 'daemon off;'
      "
    depends_on:
      - app
      - frontend
    restart: unless-stopped

  frontend:
    image: node:18-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    command: sh -c "echo 'Frontend placeholder running on 3000' && sleep infinity"
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
      - mosquitto
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: gwondb
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
    restart: unless-stopped

volumes:
  db_data: