services:
  # ⚠️ db 서비스는 정의하지 않습니다.
  # 'gwon-db' 컨테이너(ecolens/greeneye/unvail/gwon 공용 MySQL)는 이미 떠 있고,
  # 그 안에 gwon 데이터베이스를 직접 생성해 두었으므로 백엔드는 네트워크로 연결만 합니다.
  # (compose 가 db 를 다시 만들면 공용 데이터가 위험하므로 의도적으로 제외)

  backend: # Express API (gwon.run/api/*)
    container_name: gwon-backend
    restart: always
    build: ./backend
    environment:
      PORT: 8080
      DB_HOST: gwon-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      DB_NAME: gwon
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
    expose:
      - "8080"
    networks:
      - global_network

  frontend: # Vite 정적 빌드 서빙 (gwon.run/*)
    container_name: gwon-frontend
    restart: always
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        VITE_API_BASE: /api
    expose:
      - "5173"
    networks:
      - global_network
    depends_on:
      - backend

  cloudflare: # Cloudflare 터널
    image: cloudflare/cloudflared:latest
    container_name: gwon-cloudflared
    restart: always
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - global_network
    depends_on:
      - frontend
      - backend

networks:
  global_network:
    external: true
