services:
  backend:
    restart: unless-stopped
    ports:
      - "8080:8080"
    build: ./backend
    depends_on:
      - db  # MySQL이 먼저 시작되도록

  frontend:
    restart: unless-stopped
    ports:
      - "3000:3000"
    build: ./frontend

  db:
    restart: unless-stopped
    ports:
      - "3306:3306"
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: gwondb
      MYSQL_USER: gwon
      MYSQL_DATABASE: gwondb
      MYSQL_PASSWORD: gwondb
    volumes:
      - db_data:/var/lib/mysql # ✅ 들여쓰기 맞게 수정

volumes:
  db_data: