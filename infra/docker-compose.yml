# ───────────────────────────────────────────────────────────────────
# 공유 MySQL 스택 (ecolens / greeneye / unvail / gwon 공용)
#
# ⚠️ 이 스택은 앱(gwon) 배포와 분리되어 "항상" 떠 있어야 합니다.
#    데이터는 앱 레포 밖(/home/gwon/mysql_data)에 보관하므로
#    'rm -rf gwon' 으로 레포를 지워도 DB 는 영향을 받지 않습니다.
#
# 서버에서는 이 파일을  ~/infra/docker-compose.yml  로 복사해 두고 거기서 실행하세요.
#   cd ~/infra
#   echo "DB_ROOT_PASSWORD=gwon" > .env
#   docker compose up -d
# ───────────────────────────────────────────────────────────────────
services:
  db:
    image: mysql:latest # 기존 데이터(9.5.0)와 동일한 이미지 유지 (다운그레이드 방지)
    container_name: gwon-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - /home/gwon/mysql_data:/var/lib/mysql # 레포 밖 절대경로
    networks:
      - global_network

networks:
  global_network:
    external: true
